name: XO
options:
  bundleIdPrefix: com.xo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  XO:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: XO
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_NAME: XO
        PRODUCT_BUNDLE_IDENTIFIER: com.xo.game
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
  XOTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: XOTests
    dependencies:
      - target: XO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xo.game.XOTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/XO.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/XO"
        BUNDLE_LOADER: "$(TEST_HOST)"
